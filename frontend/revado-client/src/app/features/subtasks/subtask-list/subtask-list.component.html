<div class="subtask-container">
  <div class="subtask-header">
    <span class="subtask-label">Subtasks</span>
    <button class="btn-add" (click)="showAddForm.set(true)">+ Add</button>
  </div>

  @if (showAddForm()) {
    <div class="add-form">
      <input
        type="text"
        class="add-input"
        placeholder="Subtask title..."
        [ngModel]="newTitle()"
        (ngModelChange)="onNewTitleChange($event)"
        (keydown.enter)="addSubtask()"
        (keydown.escape)="showAddForm.set(false)"
      />
      <button class="btn-sm btn-save" (click)="addSubtask()">Add</button>
      <button class="btn-sm btn-cancel" (click)="showAddForm.set(false)">Cancel</button>
    </div>
  }

  @if (localSubtasks().length === 0) {
    <p class="no-subtasks">No subtasks yet</p>
  } @else {
    @for (subtask of localSubtasks(); track subtask.id) {
      <app-subtask-item
        [subtask]="subtask"
        [todoId]="todoId()"
        (changed)="onSubtaskChanged()"
      />
    }
  }
</div>
